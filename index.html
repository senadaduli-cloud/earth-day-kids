<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dita e Tokës 🌍</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(#e8f5e9, #c8e6c9);
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: #2e7d32;
    }

    button {
      padding: 12px 16px;
      margin: 6px;
      border: none;
      border-radius: 8px;
      background: #43a047;
      color: white;
      cursor: pointer;
      font-size: 15px;
    }

    #box {
      margin-top: 20px;
      background: white;
      padding: 20px;
      border-radius: 12px;
      display: inline-block;
      max-width: 700px;
      text-align: left;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .earth {
      width: 140px;
      margin: 10px;
      animation: rotate 10s linear infinite;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .qr {
      margin-top: 25px;
    }
  </style>
</head>

<body>

<h1>🌍 Dita e Tokës</h1>
<p>Projekt edukativ për nxënësit e shkollës 📚</p>

<img class="earth" src="https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg">

<br>

<button onclick="info()">📘 Toka</button>
<button onclick="ekosistem()">🌿 Ekosistemi</button>
<button onclick="problemet()">⚠️ Problemet</button>
<button onclick="zgjidhjet()">🌱 Zgjidhjet</button>
<button onclick="quiz()">🎮 Quiz</button>

<div id="box">
Zgjidh një temë për të mësuar 😊
</div>

<!-- QR CODE -->
<div class="qr">
  <h3>📱 Skano për ta hapur</h3>
  <img src="https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=https://senadaduli-cloud.github.io/earth-day-kids/">
</div>

<script>

function info() {
  document.getElementById("box").innerHTML =
    "<h2>🌍 Çfarë është Toka?</h2>" +
    "<p>Toka është planeti ynë dhe i vetmi me jetë të njohur.</p>" +
    "<p>Ajo ka atmosferë që na mbron nga Dielli ☀️</p>" +
    "<p>Ka ujë 🌊, tokë 🌱 dhe ajër 🌬️ që lejojnë jetën.</p>";
}

function ekosistem() {
  document.getElementById("box").innerHTML =
    "<h2>🌿 Ekosistemi</h2>" +
    "<p>Ekosistemi është bashkëveprimi i bimëve, kafshëve dhe natyrës.</p>" +
    "<p>Bimët prodhojnë oksigjen 🌱 dhe ushqim për jetën.</p>" +
    "<p>Çdo organizëm ka rol në balancën e natyrës 🔗</p>";
}

function problemet() {
  document.getElementById("box").innerHTML =
    "<h2>⚠️ Problemet e Tokës</h2>" +
    "<ul>" +
    "<li>Ndotja e ajrit 🚗</li>" +
    "<li>Ndotja e ujit 🌊</li>" +
    "<li>Prerja e pyjeve 🌳</li>" +
    "<li>Ngrohja globale 🌡️</li>" +
    "</ul>";
}

function zgjidhjet() {
  document.getElementById("box").innerHTML =
    "<h2>🌱 Si ta mbrojmë Tokën?</h2>" +
    "<ul>" +
    "<li>Riciklo ♻️</li>" +
    "<li>Mbill pemë 🌳</li>" +
    "<li>Kurse energjinë 💡</li>" +
    "<li>Përdor biçikletën 🚲</li>" +
    "<li>Mos ndot natyrën 🚯</li>" +
    "</ul>";
}

function quiz() {
  let score = 0;

  let q1 = prompt("1. Sa përqind e Tokës është ujë? (71 / 30)");
  if (q1 === "71") score++;

  let q2 = prompt("2. Çfarë prodhojnë pemët?");
  if (q2 && q2.toLowerCase().includes("oksigjen")) score++;

  let q3 = prompt("3. A është ndotja e dëmshme? (po/jo)");
  if (q3 === "po") score++;

  document.getElementById("box").innerHTML =
    "<h2>🎮 Rezultati yt</h2>" +
    "<p>Ke marrë " + score + " nga 3 pikë.</p>" +
    (score === 3
      ? "<p>🌟 Shkëlqyeshëm! Je ekspert i Tokës!</p>"
      : "<p>👍 Shumë mirë! Vazhdo të mësosh!</p>");
}

</script>

</body>
</html>
