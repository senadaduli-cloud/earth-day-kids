<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dita e Tokës 🌍</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(#e8f5e9, #c8e6c9);
      text-align: center;
      padding: 20px;
    }

    h1 { color: #2e7d32; }

    button {
      padding: 12px 16px;
      margin: 6px;
      border: none;
      border-radius: 8px;
      background: #43a047;
      color: white;
      cursor: pointer;
      font-size: 15px;
    }

    #box {
      margin-top: 20px;
      background: white;
      padding: 20px;
      border-radius: 12px;
      display: inline-block;
      max-width: 750px;
      text-align: left;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<h1>🌍 Dita e Tokës</h1>
<p>Projekt edukativ për nxënësit 📚</p>

<button onclick="mesim()">📘 Mësim</button>
<button onclick="probleme()">⚠️ Probleme</button>
<button onclick="keshilla()">🌱 Këshilla</button>
<button onclick="quiz()">🎮 Kuiz</button>

<div id="box">
Zgjidh një seksion për të mësuar 😊
</div>

<script>

function mesim() {
  document.getElementById("box").innerHTML =
    "<h2>📘 Mësim: Çfarë është Toka?</h2>" +

    "<p><b>Toka</b> është planeti ku jetojmë dhe është i vetmi i njohur me jetë.</p>" +

    "<p>🌍 Ajo ka 3 pjesë kryesore për jetën:</p>" +
    "<ul>" +
    "<li>🌬️ Atmosfera – ajri që ne thithim</li>" +
    "<li>🌊 Hidrosfera – të gjitha ujërat (dete, lumenj, oqeane)</li>" +
    "<li>🌱 Litosfera – toka dhe shkëmbinjtë</li>" +
    "</ul>" +

    "<p>☀️ Toka rrotullohet rreth Diellit dhe kjo krijon stinët.</p>" +

    "<p>🌿 Pa Tokën nuk do të kishte njerëz, kafshë apo bimë.</p>";
}

function probleme() {
  document.getElementById("box").innerHTML =
    "<h2>⚠️ Problemet e Tokës</h2>" +

    "<ul>" +
    "<li>🚗 Ndotja e ajrit nga makinat dhe fabrikat</li>" +
    "<li>🌊 Plastika në oqeane dhe dete</li>" +
    "<li>🌳 Prerja e pyjeve (shpyllëzimi)</li>" +
    "<li>🔥 Ngrohja globale dhe ndryshimi i klimës</li>" +
    "</ul>" +

    "<p>Këto probleme dëmtojnë kafshët, bimët dhe njerëzit.</p>";
}

function keshilla() {
  document.getElementById("box").innerHTML =
    "<h2>🌱 Këshilla për të mbrojtur Tokën</h2>" +

    "<ul>" +
    "<li>♻️ Riciklo plastikën, letrën dhe metalin</li>" +
    "<li>🌳 Mbill pemë dhe kujdesu për natyrën</li>" +
    "<li>💧 Kurse ujin</li>" +
    "<li>🚲 Përdor biçikletën ose ec në këmbë</li>" +
    "<li>🚯 Mos hidh mbeturina në natyrë</li>" +
    "<li>💡 Fik dritat kur nuk i përdor</li>" +
    "</ul>";
}

function quiz() {
  let piket = 0;

  let q1 = prompt("1. Çfarë prodhojnë pemët?");
  if (q1 && q1.toLowerCase().includes("oksigjen")) piket++;

  let q2 = prompt("2. A duhet të riciklojmë? (po/jo)");
  if (q2 === "po") piket++;

  let q3 = prompt("3. A është ndotja e dëmshme? (po/jo)");
  if (q3 === "po") piket++;

  document.getElementById("box").innerHTML =
    "<h2>🎮 Kuizi</h2>" +
    "<p>Ke marrë " + piket + " nga 3 pikë.</p>" +

    (piket === 3
      ? "<p>🌟 Shkëlqyeshëm! Je Mik i Tokës!</p>"
      : "<p>👍 Mirë! Por mund të mësosh edhe më shumë.</p>");
}

</script>

</body>
</html>
