<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dita e Tokës 🌍</title>
</head>

<body style="font-family: Arial; text-align:center; background:#e8f5e9; padding:20px;">

<h1>🌍 Dita e Tokës</h1>

<button onclick="info()">📘 Info</button>
<button onclick="keshilla()">🌱 Këshilla</button>
<button onclick="quiz()">🎮 Quiz</button>

<p id="box" style="margin-top:20px; background:white; padding:15px; display:inline-block; border-radius:10px;">
Kliko një buton 😊
</p>

<script>
function info() {
  document.getElementById("box").innerHTML =
    "🌍 Dita e Tokës festohet më 22 Prill çdo vit.";
}

function keshilla() {
  document.getElementById("box").innerHTML =
    "🌱 Riciklo<br>♻️ Mos ndot<br>🌳 Mbill pemë";
}

function quiz() {
  let a = prompt("A duhet ta mbrojmë Tokën? (po/jo)");
  if (a && a.toLowerCase() === "po") {
    alert("Bravo! 🌟");
  } else {
    alert("Provo përsëri 😊");
  }
}
</script>

</body>
</html>
